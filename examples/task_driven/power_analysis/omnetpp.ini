[General]
network = hnocs.topologies.TaskMesh
sim-time-limit = 1ms
record-eventlog = false
**.vector-recording = false

**.rows    = 4
**.columns = 4

# Run all three applications as separate configurations
[Config MatrixMultiply]
**.pe[*].application = "matrix_multiply"
**.pe[*].powerTraceFile   = "results/matrix_power.csv"
**.pe[*].hotspotTraceFile = "results/matrix_hotspot.trace"

[Config CNNInference]
**.pe[*].application = "cnn_inference"
**.pe[*].powerTraceFile   = "results/cnn_power.csv"
**.pe[*].hotspotTraceFile = "results/cnn_hotspot.trace"

[Config GraphTraversal]
**.pe[*].application = "graph_traversal"
**.pe[*].powerTraceFile   = "results/graph_power.csv"
**.pe[*].hotspotTraceFile = "results/graph_hotspot.trace"

# Router sub-module types (shared)
**.routerType  = "hnocs.routers.hier.Router"
**.portType    = "hnocs.routers.hier.Port"
**.inPortType  = "hnocs.routers.hier.inPort.InPortSync"
**.OPCalcType  = "hnocs.routers.hier.opCalc.static.XYOPCalc"
**.VCCalcType  = "hnocs.routers.hier.vcCalc.free.FLUVCCalc"
**.schedType   = "hnocs.routers.hier.sched.wormhole.SchedSync"

**.numVCs        = 2
**.flitSize      = 4B
**.statStartTime = 1us

**.pe[*].powerIdle        = 0.1W
**.pe[*].powerCompute     = 2.0W
**.pe[*].powerSendPerFlit = 0.1nJ
**.pe[*].powerRecvPerFlit = 0.05nJ

**.pe[*].enablePowerTrace    = true
**.pe[*].powerSampleInterval = 1us

**.inPort.flitsPerVC        = 4
**.inPort.collectPerHopWait = false

**.sched.arbitration_type = 0
**.sched.freeRunningClk   = false
**.heterogeneous          = false
**.givenTclk              = false
**.tClk                   = 2ns

result-dir = results
